name: build image and codedeploy
on:
 workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com/ecsv2
  IMAGE_TAG: ${{ github.sha }} #build docker image with  same commit sha

permissions:
  id-token: write #  it asks github to make the oidc token
  contents: read  #allows this pipeline to read files in this github repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
  
    steps:
      - name: checks out code
        uses: actions/checkout@v4
    
      - name: get aws creds
        uses: aws-actions/configure-aws-credentials@v3
        with :
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/oidc   
          aws-region: ${{ env.AWS_REGION }}  
        
        
      - name: login to ecr
        uses: aws-actions/amazon-ecr-login@v2  
      
      - name: Build image
        id: build-image 
        run: |
         docker build -f ./app/Dockerfile -t $AWS_ECR_REPO:$IMAGE_TAG ./app  
         echo "image=$AWS_ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: 'table'
          exit-code: 0
          severity: 'CRITICAL,HIGH'
          version: 'v0.69.2'
        

      - name: push image
        id: push-image    
        run:
         docker push $AWS_ECR_REPO:$IMAGE_TAG  
         echo "image=$AWS_ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
    

      - name: Task definition download
        id: download-task-def
        env:
         ecs_task_def_name: ecsv2
        run: |
         aws ecs describe-task-definition --task-definition "$ecs_task_def_name" --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: update-task-def-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
         task-definition: task-definition.json
         task-definition-arn:  task-definition-arn
         task-definition-family: task-definition-family-name
         container-name: ecsv2container
         image: ${{ steps.push-image.outputs.image }}


      - name: Set appspec.json values
        id: set-appspec-values
        env:
         container_port: 8080
         container_name:  ecsv2container 
         task_definition_family: ecsv2
         cluster: ecsv2cluster
         service: ecsv2service
         codedeploy-application: ecsv2codedeploy
         codedeploy-deployment-group: codedeploygroupname
        run: |
         export TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition="$task_definition_family" | jq '.taskDefinition.taskDefinitionArn')
         cat ./.github/workflows/appspec.json | jq --arg key "$TASK_DEF_ARN" '.Resources[].TargetService.Properties.TaskDefinition=$key' \
         | jq --arg key "$container_port" '.Resources[].TargetService.Properties.LoadBalancerInfo.ContainerPort=$key' \
         | jq --arg key "$container_name" '.Resources[].TargetService.Properties.LoadBalancerInfo.ContainerName=$key' > .aws/appspec.json
         sed -i 's#\\"##g' .aws/appspec.json


      - name: ECS task deployment using CodeDeploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        env:
          ACTIONS_STEP_DEBUG: true #enable step debug logging
        with:
          task-definition: ${{ steps.update-task-def-image.outputs.task-definition }}
          service: ecsv2service
          cluster: ecsv2cluster
          wait-for-service-stability: true
          codedeploy-appspec: appspec.json
          codedeploy-application: ecsv2codedeploy
          codedeploy-deployment-group: codedeploygroupname